<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrawCanvas — Ruang Ekspresi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">DrawCanvas</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" id="navDraw" onclick="showSection('draw')">Gambar</button>
        <button class="nav-btn" id="navGallery" onclick="showSection('gallery')">Galeri</button>
      </nav>
    </div>
  </header>

  <!-- DRAWING SECTION -->
  <main id="sectionDraw" class="section active">
    <div class="draw-layout">

      <!-- Left: Canvas area -->
      <div class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="drawingCanvas" width="800" height="560"></canvas>
          <div class="canvas-overlay" id="canvasOverlay">
            <span>Klik untuk mulai menggambar</span>
          </div>
        </div>
      </div>

      <!-- Right: Tools -->
      <aside class="tools-panel">
        <div class="tools-section">
          <label class="tools-label">ALAT</label>
          <div class="tool-grid">
            <button class="tool-btn active" id="toolPen" onclick="setTool('pen')" title="Pena">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
            </button>
            <button class="tool-btn" id="toolBrush" onclick="setTool('brush')" title="Kuas">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94C5.79 16.88 4.16 18.32 2 19c1.17-2.84 3.43-5.02 5.12-6.31"/></svg>
            </button>
            <button class="tool-btn" id="toolMarker" onclick="setTool('marker')" title="Spidol">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="10" rx="2"/><line x1="22" y1="12" x2="20" y2="12"/></svg>
            </button>
            <button class="tool-btn" id="toolLine" onclick="setTool('line')" title="Garis">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
            </button>
            <button class="tool-btn" id="toolRect" onclick="setTool('rect')" title="Kotak">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
            <button class="tool-btn" id="toolCircle" onclick="setTool('circle')" title="Lingkaran">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
            </button>
            <button class="tool-btn" id="toolFill" onclick="setTool('fill')" title="Isi warna">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11V20a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-9"/><path d="M21 10H3"/><path d="M9 3v7"/><path d="M15 3v7"/></svg>
            </button>
            <button class="tool-btn" id="toolEraser" onclick="setTool('eraser')" title="Penghapus">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l11-11 7 7-1 8z"/><line x1="6" y1="14" x2="10" y2="18"/></svg>
            </button>
          </div>
        </div>

        <div class="tools-section">
          <label class="tools-label">WARNA</label>
          <div class="color-palette">
            <button class="color-swatch active" style="background:#1a1a2e" onclick="setColor('#1a1a2e')"></button>
            <button class="color-swatch" style="background:#e63946" onclick="setColor('#e63946')"></button>
            <button class="color-swatch" style="background:#f4a261" onclick="setColor('#f4a261')"></button>
            <button class="color-swatch" style="background:#2a9d8f" onclick="setColor('#2a9d8f')"></button>
            <button class="color-swatch" style="background:#457b9d" onclick="setColor('#457b9d')"></button>
            <button class="color-swatch" style="background:#a8dadc" onclick="setColor('#a8dadc')"></button>
            <button class="color-swatch" style="background:#e9c46a" onclick="setColor('#e9c46a')"></button>
            <button class="color-swatch" style="background:#6d6875" onclick="setColor('#6d6875')"></button>
            <button class="color-swatch" style="background:#b5838d" onclick="setColor('#b5838d')"></button>
            <button class="color-swatch" style="background:#52b788" onclick="setColor('#52b788')"></button>
            <button class="color-swatch" style="background:#ffffff;border:1px solid #ddd" onclick="setColor('#ffffff')"></button>
            <div class="custom-color-wrap">
              <input type="color" id="customColor" value="#1a1a2e" onchange="setColor(this.value)" />
              <span>+</span>
            </div>
          </div>
          <div class="current-color-display">
            <div class="current-swatch" id="currentSwatch"></div>
            <span id="currentColorHex">#1a1a2e</span>
          </div>
        </div>

        <div class="tools-section">
          <label class="tools-label">UKURAN KUAS</label>
          <div class="size-control">
            <input type="range" id="brushSize" min="1" max="60" value="8" oninput="updateBrushSize(this.value)" />
            <span id="brushSizeVal">8px</span>
          </div>
          <div class="size-preview-wrap">
            <canvas id="sizePreview" width="60" height="60"></canvas>
          </div>
        </div>

        <div class="tools-section">
          <label class="tools-label">OPASITAS</label>
          <div class="size-control">
            <input type="range" id="opacity" min="5" max="100" value="100" oninput="updateOpacity(this.value)" />
            <span id="opacityVal">100%</span>
          </div>
        </div>

        <div class="tools-section action-section">
          <div class="action-row">
            <button class="action-btn secondary" onclick="undoLast()" title="Undo (Ctrl+Z)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
              Undo
            </button>
            <button class="action-btn secondary" onclick="clearCanvas()" title="Hapus semua">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              Clear
            </button>
          </div>
          <button class="action-btn primary" onclick="openSubmitModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Kirim ke Admin
          </button>
        </div>
      </aside>
    </div>
  </main>

  <!-- GALLERY SECTION -->
  <main id="sectionGallery" class="section">
    <div class="gallery-header">
      <h2 class="section-title">Galeri Karya</h2>
      <p class="section-subtitle">Karya yang telah disetujui admin</p>
    </div>
    <div class="gallery-grid" id="galleryGrid">
      <div class="gallery-loading">
        <div class="spinner"></div>
        <span>Memuat karya...</span>
      </div>
    </div>
  </main>

  <!-- Submit Modal -->
  <div class="modal-overlay" id="submitModal">
    <div class="modal">
      <div class="modal-header">
        <h3>✦ Kirim Karya</h3>
        <button class="modal-close" onclick="closeSubmitModal()">×</button>
      </div>
      <div class="modal-preview">
        <img id="previewImg" src="" alt="Preview gambar" />
      </div>
      <div class="modal-form">
        <div class="form-group">
          <label>Judul Karya *</label>
          <input type="text" id="drawingTitle" placeholder="Beri judul karyamu..." maxlength="100" />
        </div>
        <div class="form-group">
          <label>Nama Kamu *</label>
          <input type="text" id="authorName" placeholder="Nama atau nickname..." maxlength="50" />
        </div>
        <div class="form-group">
          <label>Pesan ke Admin</label>
          <textarea id="drawingMessage" placeholder="Ceritakan tentang karyamu..." rows="3" maxlength="300"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn secondary" onclick="closeSubmitModal()">Batal</button>
        <button class="action-btn primary" onclick="submitDrawing()" id="submitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Kirim Sekarang
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="../js/canvas.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
