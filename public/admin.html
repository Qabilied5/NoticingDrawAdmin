<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — DrawCanvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/public/css/admin.css" />
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">✦</span>
        <h1>DrawCanvas</h1>
        <p>Admin Panel</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="Username admin" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
        <button class="login-btn" onclick="doLogin()">Masuk</button>
        <div class="login-error" id="loginError"></div>
      </div>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="dashboard" class="dashboard hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">✦</span>
        <span>DrawCanvas</span>
      </div>
      <nav class="sidebar-nav">
        <button class="sn-btn active" onclick="filterDrawings('all')" id="filterAll">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Semua
          <span class="badge" id="badgeAll">0</span>
        </button>
        <button class="sn-btn" onclick="filterDrawings('pending')" id="filterPending">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Menunggu
          <span class="badge badge-yellow" id="badgePending">0</span>
        </button>
        <button class="sn-btn" onclick="filterDrawings('approved')" id="filterApproved">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Disetujui
          <span class="badge badge-green" id="badgeApproved">0</span>
        </button>
        <button class="sn-btn" onclick="filterDrawings('rejected')" id="filterRejected">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Ditolak
          <span class="badge badge-red" id="badgeRejected">0</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <a href="/" class="sn-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Halaman Utama
        </a>
        <button class="sn-btn logout-btn" onclick="doLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-left">
          <h2 id="pageTitle">Semua Gambar</h2>
          <span id="pageCount" class="page-count">0 karya</span>
        </div>
        <div class="topbar-right">
          <span class="admin-user">👤 <span id="adminUser">Admin</span></span>
        </div>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">Total Karya</span>
        </div>
        <div class="stat-card stat-yellow">
          <span class="stat-num" id="statPending">0</span>
          <span class="stat-label">Menunggu</span>
        </div>
        <div class="stat-card stat-green">
          <span class="stat-num" id="statApproved">0</span>
          <span class="stat-label">Disetujui</span>
        </div>
        <div class="stat-card stat-red">
          <span class="stat-num" id="statRejected">0</span>
          <span class="stat-label">Ditolak</span>
        </div>
      </div>

      <!-- Drawing Grid -->
      <div class="drawing-grid" id="drawingGrid">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Memuat data...</span>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="admin-modal">
      <div class="modal-header">
        <h3 id="modalTitle">Detail Gambar</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="admin-modal-body">
        <div class="modal-img-wrap">
          <img id="modalImg" src="" alt="Gambar" />
        </div>
        <div class="modal-info">
          <div class="info-row">
            <span class="info-label">Judul</span>
            <span class="info-val" id="modalDrawTitle">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Nama</span>
            <span class="info-val" id="modalAuthor">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Pesan</span>
            <span class="info-val" id="modalMessage">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Tanggal</span>
            <span class="info-val" id="modalDate">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-val" id="modalStatus">—</span>
          </div>
          <div class="form-group">
            <label>Catatan Admin</label>
            <textarea id="adminNote" rows="2" placeholder="Catatan opsional..."></textarea>
          </div>
          <div class="modal-actions">
            <button class="admin-btn approve" onclick="updateStatus('approved')">✓ Setujui</button>
            <button class="admin-btn reject" onclick="updateStatus('rejected')">✕ Tolak</button>
            <button class="admin-btn delete" onclick="deleteDrawing()">🗑 Hapus</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="public/js/admin.js"></script>
</body>
</html>
